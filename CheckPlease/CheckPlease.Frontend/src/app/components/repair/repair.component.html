<div
  class="container"
  cdk-scrollable
>
  <check-please-client-option
    *ngIf="state === 'client'"
    (saveClientId)="getClientId($event)"
  ></check-please-client-option>
  <check-please-car-option
    *ngIf="state === 'car'"
    (saveCarId)="getCarId($event)"
    (newCarMileage)="getNewCarMileage($event)"
  ></check-please-car-option>
  <check-please-repair-info
    *ngIf="state === 'repair'"
    (passRepairData)="getRepairData($event)"
    [newMileage]="newMileage"
  ></check-please-repair-info>
</div>
