<div
  class="container"
  cdk-scrollable
>
  <div class="container-2">
    <h1 class="heading">{{ 'COMMON.MENU' | translate }}</h1>
    <div class="menu-container">
      <div
        class="menu-item wrench"
        [routerLink]="['/repair']"
      >
        <fa-icon
          class="icon"
          [icon]="faWrench"
        ></fa-icon>
        <span
          class="item-title"
          (mouseover)="changeColor()"
        >
          Новый ремонт
        </span>
      </div>
      <div
        class="menu-item search"
        [routerLink]="['/search']"
      >
        <fa-icon
          class="icon"
          [icon]="faSearch"
        ></fa-icon>
        <span class="item-title"> История машины </span>
      </div>

      <div
        class="menu-item search"
        [routerLink]="['/repairs']"
      >
        <fa-icon
          class="icon"
          [icon]="faSearch"
        ></fa-icon>
        <span class="item-title"> Редактирование ремонта </span>
      </div>

      <div
        class="menu-item database"
        (click)="startDownload()"
      >
        <ng-container *ngIf="isLoaded$ | async; else loading">
          <fa-icon
            class="icon"
            [icon]="faDatabase"
          ></fa-icon>
          <span class="item-title"> Скачать базу данных </span>
        </ng-container>
        <ng-template #loading>
          <div class="loader">
            <check-please-loading loaderSize="large"></check-please-loading>
          </div>
        </ng-template>
      </div>

      <div
        class="menu-item search"
        (click)="changeColor()"
      >
        <fa-icon
          class="icon"
          [icon]="faSearch"
        ></fa-icon>
        <span class="item-title"> Сменить тему </span>
        <mat-spinner [diameter]="20"></mat-spinner>
      </div>
    </div>
  </div>
</div>
