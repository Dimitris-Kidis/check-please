<div class="container">
  <div
    class="button-container"
    [routerLink]="['/menu']"
  >
    <fa-icon
      class="back-icon"
      [icon]="faArrowLeft"
    ></fa-icon>
    <span class="go-back-btn"> Вернуться в меню</span>
  </div>
  <input
    #mileageInput
    type="text"
    class="solid-input"
    [(ngModel)]="mileage"
    placeholder="Новый пробег *"
  />
  <input
    type="text"
    class="solid-input"
    [(ngModel)]="problems"
    placeholder="Описание проблем"
  />

  <table class="table">
    <tr>
      <td class="title"></td>
      <td class="download-cell"></td>
      <td class="download-cell"></td>
    </tr>
    <tr>
      <td class="title"></td>
      <td class="download-cell"></td>
      <td class="download-cell"></td>
    </tr>
  </table>
  <div
    class="download-container"
    (click)="passRepairInfo()"
  >
    <ng-container *ngIf="isLoaded$ | async; else loading">
      <fa-icon
        class="download-icon"
        [icon]="faDownload"
      ></fa-icon>
      <span class="download-text"> Скачать чек </span>
    </ng-container>
    <ng-template #loading>
      <div class="loader">
        <check-please-loading loaderSize="large"></check-please-loading>
      </div>
